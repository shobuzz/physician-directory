<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MD Directory">
<title>Referring Physician Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F4F0; --surface: #FFFFFF; --surface2: #EFEFEB;
    --border: #E2E0DA; --text: #1A1916; --text2: #6B6960; --text3: #9B9A95;
    --accent: #1B4D8E; --accent-light: #E8EFF8;
    --green: #276749; --green-bg: #EBF5EF;
    --purple: #5B3FA6; --purple-bg: #EEEDFE;
    --slate: #3D5A7A; --slate-bg: #E0EAF4;
    --radius: 14px; --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; }

  /* ── Header ── */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: calc(var(--safe-top) + 16px) 20px 16px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .header-title { font-size: 20px; font-weight: 600; letter-spacing: -0.4px; }
  .header-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .count-badge { background: var(--accent-light); color: var(--accent); font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; font-family: 'DM Mono', monospace; }

  .icon-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
  .icon-btn:hover { background: var(--bg); }
  .icon-btn.spinning svg { animation: spin 0.7s linear infinite; }
  .icon-btn.add { background: var(--accent); border-color: var(--accent); color: white; }
  .icon-btn.add:hover { opacity: 0.9; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Search ── */
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text3); pointer-events: none; }
  .search-input { width: 100%; padding: 11px 36px 11px 38px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); outline: none; transition: border-color 0.15s; }
  .search-input:focus { border-color: var(--accent); background: var(--surface); }
  .search-input::placeholder { color: var(--text3); }
  .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--text3); border: none; color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 11px; cursor: pointer; display: none; align-items: center; justify-content: center; }
  .clear-btn.visible { display: flex; }

  /* ── Status ── */
  .status-bar { display: flex; align-items: center; gap: 7px; padding: 10px 20px 0; font-size: 12px; color: var(--text3); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; transition: background 0.4s; }
  .status-dot.live { background: #276749; }
  .status-dot.cached { background: #e67e22; }

  /* ── Filters ── */
  .filters { display: flex; gap: 8px; overflow-x: auto; padding: 12px 20px 0; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .chip { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1.5px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .chip.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* ── List ── */
  .list-wrap { padding: 14px 16px calc(var(--safe-bot) + 80px); display: flex; flex-direction: column; gap: 10px; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text3); padding: 2px 4px 8px; }

  /* ── Cards ── */
  .doc-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: transform 0.12s; animation: fadeUp 0.3s both; }
  .doc-card:active { transform: scale(0.985); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .card-main { display: flex; align-items: center; gap: 14px; padding: 16px; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--accent-light); color: var(--accent); font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; letter-spacing: -0.5px; }
  .card-info { flex: 1; min-width: 0; }
  .doc-name { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-group { font-size: 13px; color: var(--text2); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chevron { color: var(--text3); flex-shrink: 0; transition: transform 0.2s; }
  .card-expanded .chevron { transform: rotate(90deg); }

  .card-actions { display: none; border-top: 1px solid var(--border); padding: 12px 14px; flex-direction: column; gap: 8px; }
  .card-expanded .card-actions { display: flex; }
  .actions-row { display: flex; gap: 8px; }
  .action-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 8px; border-radius: var(--radius-sm); border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; transition: opacity 0.15s, transform 0.1s; white-space: nowrap; }
  .action-btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn-call { background: var(--green-bg); color: var(--green); }
  .btn-text { background: var(--purple-bg); color: var(--purple); }
  .btn-office { background: var(--slate-bg); color: var(--slate); }
  .btn-label { display: flex; flex-direction: column; align-items: flex-start; }
  .btn-title { font-size: 13px; font-weight: 600; line-height: 1.2; }
  .btn-num { font-family: 'DM Mono', monospace; font-weight: 400; font-size: 10px; opacity: 0.65; margin-top: 1px; }

  /* ── Add Doctor Drawer ── */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }

  .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-radius: 20px 20px 0 0; z-index: 201; padding: 0 20px calc(var(--safe-bot) + 24px); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); max-height: 90dvh; overflow-y: auto; }
  .drawer.open { transform: translateY(0); }

  .drawer-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 20px; }
  .drawer-title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 20px; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 6px; }
  .field input { width: 100%; padding: 12px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); outline: none; transition: border-color 0.15s; }
  .field input:focus { border-color: var(--accent); background: var(--surface); }
  .field input::placeholder { color: var(--text3); }

  .submit-btn { width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none; background: var(--accent); color: white; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.15s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .submit-btn:active { transform: scale(0.98); opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .form-status { text-align: center; font-size: 13px; margin-top: 12px; min-height: 20px; }
  .form-status.success { color: var(--green); }
  .form-status.error { color: #c0392b; }

  /* ── Skeleton ── */
  .skeleton-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; display: flex; align-items: center; gap: 14px; animation: fadeUp 0.3s both; }
  .skel { background: var(--surface2); border-radius: 6px; animation: pulse 1.4s ease-in-out infinite; }
  .skel-avatar { width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0; }
  .skel-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .skel-a { height: 14px; width: 50%; } .skel-b { height: 12px; width: 35%; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }

  /* ── Empty ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 15px; margin-bottom: 4px; color: var(--text2); }
  .empty-sub { font-size: 13px; line-height: 1.6; }

  /* ── Bottom bar ── */
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 20px calc(var(--safe-bot) + 12px); display: flex; align-items: center; justify-content: center; gap: 6px; }
  .bottom-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); }
  .bottom-text { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }

  .install-banner { background: var(--accent); color: white; padding: 12px 20px; font-size: 13px; line-height: 1.4; display: none; align-items: center; justify-content: space-between; gap: 12px; }
  .install-banner.show { display: flex; }
  .install-banner button { background: white; color: var(--accent); border: none; border-radius: 6px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
</style>
</head>
<body>

<div class="install-banner" id="installBanner">
  <span>Tap Share → "Add to Home Screen" for quick access</span>
  <button onclick="this.parentElement.classList.remove('show')">Got it</button>
</div>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">Referring Physicians</div>
      <div class="header-sub">Department directory</div>
    </div>
    <div class="header-right">
      <div class="count-badge" id="countBadge">—</div>
      <button class="icon-btn" id="refreshBtn" onclick="loadData(true)" title="Refresh">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
      </button>
      <button class="icon-btn add" onclick="openDrawer()" title="Add physician">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-input" type="search" id="searchInput"
      placeholder="Search by name or group…"
      oninput="handleSearch(this.value)"
      autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Loading directory…</span>
</div>

<div class="filters" id="filterBar"></div>
<div class="list-wrap" id="listWrap"></div>

<div class="bottom-bar">
  <div class="bottom-dot"></div>
  <div class="bottom-text" id="bottomText">—</div>
  <div class="bottom-dot"></div>
</div>

<!-- Add Doctor Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">Add physician</div>

  <div class="field">
    <label>Physician name</label>
    <input type="text" id="f-name" placeholder="e.g. Smith" autocomplete="off">
  </div>
  <div class="field">
    <label>Cell number</label>
    <input type="tel" id="f-cell" placeholder="305-000-0000" autocomplete="off">
  </div>
  <div class="field">
    <label>Office number</label>
    <input type="tel" id="f-office" placeholder="305-000-0000" autocomplete="off">
  </div>
  <div class="field">
    <label>Physician group</label>
    <input type="text" id="f-group" placeholder="e.g. Baptist" autocomplete="off">
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitDoctor()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    Add to directory
  </button>
  <div class="form-status" id="formStatus"></div>
</div>

<script>
const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTUHCOTLplXgHzJ9GnpiwU52zVkE38in2OMUHWjtltFbCYup9UvTTbhhjIi_ctUpM5HqOuSpNCvDDbu/pub?gid=1848910370&single=true&output=csv";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyqTIP_TLJjaNkukoSjRBTMsGvPIpbfE2sJqGcXag86xCaAkAjHThTNYFTmRFDT1QG2Ig/exec";

const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => url
];

const FALLBACK = [
  { name: "Bhatia",   cell: "305-546-3711", office: "305-555-5555", group: "Uhealth" },
  { name: "Shah",     cell: "305-668-7714", office: "305-111-1111", group: "UPMC" },
  { name: "Komotar",  cell: "305-926-3060", office: "305-222-2222", group: "Baptist" },
  { name: "Ivan",     cell: "305-123-1234", office: "305-333-3333", group: "Nicklaus" },
  { name: "Gerszten", cell: "305-612-1232", office: "305-444-4444", group: "Physicians of Miami" },
  { name: "Levi",     cell: "305-123-4321", office: "305-666-6666", group: "PCP Miami" },
  { name: "Rivera",   cell: "305-123-4231", office: "305-777-7777", group: "PCP Florida" },
];

let doctors = [], activeGroup = "All", searchQuery = "", expandedIndex = -1;

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, "").toLowerCase());
  return lines.slice(1).map(line => {
    const vals = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur); cur = ""; }
      else { cur += c; }
    }
    vals.push(cur);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || "").trim());
    return obj;
  });
}

function normalizeDoctor(raw) {
  return {
    name:   (raw["physician name"] || raw["name"]   || "").trim(),
    cell:   (raw["phone number"]   || raw["cell"]   || raw["phone"]  || "").trim(),
    office: (raw["office number"]  || raw["office"] || "").trim(),
    group:  (raw["physician group"]|| raw["group"]  || "").trim(),
  };
}

async function tryFetch(url) {
  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy(url), { signal: AbortSignal.timeout(6000) });
      if (!res.ok) continue;
      const text = await res.text();
      if (text.includes(",")) return text;
    } catch { continue; }
  }
  return null;
}

async function loadData(manual = false) {
  const btn = document.getElementById("refreshBtn");
  btn.classList.add("spinning");
  if (manual || doctors.length === 0) showSkeletons();
  setStatus("", "Loading directory…");

  const text = await tryFetch(SHEET_CSV + "&t=" + Date.now());
  if (text) {
    const parsed = parseCSV(text).map(normalizeDoctor).filter(d => d.name);
    if (parsed.length > 0) {
      doctors = parsed;
      const t = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      setStatus("live", "Live · updated " + t);
      expandedIndex = -1;
      render();
      btn.classList.remove("spinning");
      return;
    }
  }

  if (doctors.length === 0) {
    doctors = FALLBACK;
    setStatus("cached", "Showing saved data · tap ↻ to retry");
    render();
  } else {
    setStatus("cached", "Could not refresh · showing last data");
  }
  btn.classList.remove("spinning");
}

function setStatus(type, text) {
  document.getElementById("statusDot").className = "status-dot" + (type ? " " + type : "");
  document.getElementById("statusText").textContent = text;
}

function showSkeletons() {
  document.getElementById("listWrap").innerHTML =
    [0,1,2,3].map((_, i) => `
      <div class="skeleton-card" style="animation-delay:${i*60}ms">
        <div class="skel skel-avatar"></div>
        <div class="skel-lines"><div class="skel skel-a"></div><div class="skel skel-b"></div></div>
      </div>`).join("");
  document.getElementById("filterBar").innerHTML = "";
  document.getElementById("countBadge").textContent = "—";
  document.getElementById("bottomText").textContent = "loading…";
}

function getInitials(name) {
  const parts = name.trim().split(/\s+/);
  return parts.length >= 2
    ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
    : name.substring(0, 2).toUpperCase();
}

function getGroups() {
  return ["All", ...new Set(doctors.map(d => d.group).filter(Boolean))].sort((a,b) =>
    a === "All" ? -1 : b === "All" ? 1 : a.localeCompare(b));
}

function getFiltered() {
  return doctors.filter(d => {
    const matchGroup = activeGroup === "All" || d.group === activeGroup;
    const q = searchQuery.toLowerCase();
    return matchGroup && (!q || d.name.toLowerCase().includes(q) || d.group.toLowerCase().includes(q));
  });
}

const iconPhone = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.27 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.18 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.15a16 16 0 0 0 5.94 5.94l1.42-1.42a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 14.92z"/></svg>`;
const iconSMS  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;
const iconDesk = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><path d="M8 21h8m-4-4v4"/></svg>`;

function makeBtn(cls, href, icon, title, num) {
  return `<a class="action-btn ${cls}" href="${href}">
    ${icon}
    <span class="btn-label">
      <span class="btn-title">${title}</span>
      ${num ? `<span class="btn-num">${num}</span>` : ""}
    </span>
  </a>`;
}

function render() {
  const filtered = getFiltered();
  const wrap = document.getElementById("listWrap");
  document.getElementById("countBadge").textContent = filtered.length;
  document.getElementById("bottomText").textContent =
    filtered.length === 1 ? "1 physician" : filtered.length + " physicians";

  wrap.innerHTML = "";

  if (!filtered.length) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No results</div><div class="empty-sub">Try a different name or group</div></div>`;
    renderFilters(); return;
  }

  if (activeGroup === "All" && !searchQuery) {
    const lbl = document.createElement("div");
    lbl.className = "section-label";
    lbl.textContent = "All Physicians";
    wrap.appendChild(lbl);
  }

  filtered.forEach((doc, i) => {
    const ri = doctors.indexOf(doc);
    const expanded = expandedIndex === ri;
    const card = document.createElement("div");
    card.className = "doc-card" + (expanded ? " card-expanded" : "");
    card.style.animationDelay = (i * 35) + "ms";
    const hasCell = doc.cell.length > 3;
    const hasOffice = doc.office.length > 3;

    const row1 = hasCell ? `<div class="actions-row">
      ${makeBtn("btn-call",  "tel:" + doc.cell, iconPhone, "Call cell",  doc.cell)}
      ${makeBtn("btn-text",  "sms:" + doc.cell, iconSMS,   "Text cell",  doc.cell)}
    </div>` : "";

    const row2 = hasOffice ? `<div class="actions-row">
      ${makeBtn("btn-office", "tel:" + doc.office, iconDesk, "Call office", doc.office)}
    </div>` : "";

    card.innerHTML = `
      <div class="card-main" onclick="toggleCard(${ri})">
        <div class="avatar">${getInitials(doc.name)}</div>
        <div class="card-info">
          <div class="doc-name">Dr. ${doc.name}</div>
          <div class="doc-group">${doc.group || "—"}</div>
        </div>
        <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </div>
      <div class="card-actions">${row1}${row2}</div>`;
    wrap.appendChild(card);
  });

  renderFilters();
}

function renderFilters() {
  const bar = document.getElementById("filterBar");
  bar.innerHTML = "";
  getGroups().forEach(g => {
    const chip = document.createElement("button");
    chip.className = "chip" + (g === activeGroup ? " active" : "");
    chip.textContent = g;
    chip.onclick = () => { activeGroup = g; expandedIndex = -1; render(); };
    bar.appendChild(chip);
  });
}

function toggleCard(index) {
  expandedIndex = expandedIndex === index ? -1 : index;
  render();
}

function handleSearch(val) {
  searchQuery = val; expandedIndex = -1;
  document.getElementById("clearBtn").classList.toggle("visible", val.length > 0);
  render();
}

function clearSearch() {
  document.getElementById("searchInput").value = "";
  searchQuery = ""; expandedIndex = -1;
  document.getElementById("clearBtn").classList.remove("visible");
  render();
}

// ── Drawer ──
function openDrawer() {
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawerOverlay").classList.add("open");
  document.getElementById("f-name").focus();
}

function closeDrawer() {
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawerOverlay").classList.remove("open");
  document.getElementById("formStatus").textContent = "";
  document.getElementById("formStatus").className = "form-status";
}

async function submitDoctor() {
  const name   = document.getElementById("f-name").value.trim();
  const cell   = document.getElementById("f-cell").value.trim();
  const office = document.getElementById("f-office").value.trim();
  const group  = document.getElementById("f-group").value.trim();

  if (!name) {
    setFormStatus("Please enter a physician name.", "error");
    return;
  }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 0.7s linear infinite"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg> Adding…`;
  setFormStatus("", "");

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, cell, office, group })
    });

    // no-cors means we can't read the response, but if it didn't throw it worked
    setFormStatus("Dr. " + name + " added successfully!", "success");

    // Clear form
    ["f-name","f-cell","f-office","f-group"].forEach(id => document.getElementById(id).value = "");

    // Reload directory after short delay so sheet has time to update
    setTimeout(() => {
      closeDrawer();
      loadData(true);
    }, 1800);

  } catch (err) {
    setFormStatus("Something went wrong. Please try again.", "error");
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> Add to directory`;
}

function setFormStatus(msg, type) {
  const el = document.getElementById("formStatus");
  el.textContent = msg;
  el.className = "form-status" + (type ? " " + type : "");
}

setInterval(loadData, 5 * 60 * 1000);

if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone) {
  setTimeout(() => document.getElementById("installBanner").classList.add("show"), 2500);
}

loadData();
</script>
</body>
</html>
