<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MD Directory">
<title>Referring Physician Directory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F4F0; --surface: #FFFFFF; --surface2: #EFEFEB;
    --border: #E2E0DA; --text: #1A1916; --text2: #6B6960; --text3: #9B9A95;
    --accent: #005030; --accent-light: #E6F0EC;
    --green: #276749; --green-bg: #EBF5EF;
    --purple: #F47321; --purple-bg: #FEF0E6;
    --slate: #005030; --slate-bg: #E6F0EC;
    --radius: 14px; --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; overflow-x: hidden; padding-top: 230px; }

  /* ── Header ── */
  .header { background: #1a1a1a; border-bottom: 2px solid #F47321; padding: calc(var(--safe-top) + 12px) 20px 14px; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .header-title { font-size: 20px; font-weight: 600; letter-spacing: -0.4px; color: #FFFFFF; }
  .header-sub { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .count-badge { background: rgba(244,115,33,0.2); color: #F47321; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; font-family: 'DM Mono', monospace; border: 1px solid rgba(244,115,33,0.4); }

  .icon-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
  .icon-btn:hover { background: rgba(255,255,255,0.2); }
  .icon-btn.spinning svg { animation: spin 0.7s linear infinite; }
  .icon-btn.add { background: #F47321; border-color: #F47321; color: white; }
  .icon-btn.add:hover { opacity: 0.9; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Search ── */
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text3); pointer-events: none; }
  .search-input { width: 100%; padding: 11px 36px 11px 38px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); outline: none; transition: border-color 0.15s; }
  .search-input:focus { border-color: var(--accent); background: var(--surface); }
  .search-input::placeholder { color: var(--text3); }
  .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--text3); border: none; color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 11px; cursor: pointer; display: none; align-items: center; justify-content: center; }
  .clear-btn.visible { display: flex; }

  /* ── Status ── */
  .status-bar { display: flex; align-items: center; gap: 7px; padding: 10px 20px 8px; font-size: 12px; color: var(--text3); position: fixed; top: 152px; left: 0; right: 0; z-index: 98; background: var(--bg); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; transition: background 0.4s; }
  .status-dot.live { background: #276749; }
  .status-dot.cached { background: #e67e22; }

  /* ── Filters ── */
  .filters { display: flex; gap: 8px; overflow-x: auto; padding: 12px 20px; scrollbar-width: none; position: fixed; top: 190px; left: 0; right: 0; z-index: 99; background: var(--bg); border-bottom: 1px solid var(--border); }
  .filters::-webkit-scrollbar { display: none; }
  .chip { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1.5px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .chip.active { background: #005030; border-color: #005030; color: white; }

  /* ── List ── */
  .list-wrap { padding: 240px 16px calc(var(--safe-bot) + 80px); display: flex; flex-direction: column; gap: 10px; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text3); padding: 2px 4px 8px; }

  /* ── Cards ── */
  .doc-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: transform 0.12s; animation: fadeUp 0.3s both; }
  .doc-card:active { transform: scale(0.985); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .card-main { display: flex; align-items: center; gap: 14px; padding: 16px; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--accent-light); color: var(--accent); font-size: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; letter-spacing: -0.5px; }
  .card-info { flex: 1; min-width: 0; }
  .doc-name { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .doc-group { font-size: 13px; color: var(--text2); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chevron { color: var(--text3); flex-shrink: 0; transition: transform 0.2s; }
  .card-expanded .chevron { transform: rotate(90deg); }

  .card-actions { display: none; border-top: 1px solid var(--border); padding: 12px 14px; flex-direction: column; gap: 8px; }
  .card-expanded .card-actions { display: flex; }
  .actions-row { display: flex; gap: 8px; }
  .action-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 11px 8px; border-radius: var(--radius-sm); border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; transition: opacity 0.15s, transform 0.1s; white-space: nowrap; }
  .action-btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn-call { background: var(--green-bg); color: var(--green); }
  .btn-text { background: var(--purple-bg); color: var(--purple); }
  .btn-office { background: var(--slate-bg); color: var(--slate); }
  .btn-label { display: flex; flex-direction: column; align-items: flex-start; }
  .btn-title { font-size: 13px; font-weight: 600; line-height: 1.2; }
  .btn-num { font-family: 'DM Mono', monospace; font-weight: 400; font-size: 10px; opacity: 0.65; margin-top: 1px; }

  /* ── Add Doctor Drawer ── */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }

  .drawer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-radius: 20px 20px 0 0; z-index: 201; padding: 0 20px calc(var(--safe-bot) + 24px); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); max-height: 90dvh; overflow-y: auto; }
  .drawer.open { transform: translateY(0); }

  .drawer-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 20px; }
  .drawer-title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 20px; }

  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 6px; }
  .field input { width: 100%; padding: 12px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); outline: none; transition: border-color 0.15s; }
  .field input:focus { border-color: var(--accent); background: var(--surface); }
  .field input::placeholder { color: var(--text3); }

  .submit-btn { width: 100%; padding: 14px; border-radius: var(--radius-sm); border: none; background: #005030; color: white; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.15s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .submit-btn:active { transform: scale(0.98); opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .form-status { text-align: center; font-size: 13px; margin-top: 12px; min-height: 20px; }
  .form-status.success { color: var(--green); }
  .form-status.error { color: #c0392b; }

  /* ── Skeleton ── */
  .skeleton-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; display: flex; align-items: center; gap: 14px; animation: fadeUp 0.3s both; }
  .skel { background: var(--surface2); border-radius: 6px; animation: pulse 1.4s ease-in-out infinite; }
  .skel-avatar { width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0; }
  .skel-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .skel-a { height: 14px; width: 50%; } .skel-b { height: 12px; width: 35%; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }

  /* ── Empty ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 15px; margin-bottom: 4px; color: var(--text2); }
  .empty-sub { font-size: 13px; line-height: 1.6; }

  /* ── Bottom bar ── */
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 20px calc(var(--safe-bot) + 12px); display: flex; align-items: center; justify-content: center; gap: 6px; }
  .bottom-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); }
  .bottom-text { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }

  .install-banner { background: #005030; color: white; padding: 12px 20px; font-size: 13px; line-height: 1.4; display: none; align-items: center; justify-content: space-between; gap: 12px; }
  .install-banner.show { display: flex; }
  .install-banner button { background: white; color: var(--accent); border: none; border-radius: 6px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
</style>
</head>

let doctors = [], activeGroup = "All", searchQuery = "", expandedIndex = -1;

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, "").toLowerCase());
  return lines.slice(1).map(line => {
    const vals = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur); cur = ""; }
      else { cur += c; }
    }
    vals.push(cur);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || "").trim());
    return obj;
  });
}

function normalizeDoctor(raw) {
  return {
    name:   (raw["physician name"] || raw["name"]   || "").trim(),
    cell:   (raw["phone number"]   || raw["cell"]   || raw["phone"]  || "").trim(),
    office: (raw["office number"]  || raw["office"] || "").trim(),
    group:  (raw["physician group"]|| raw["group"]  || "").trim(),
  };
}

async function tryFetch(url) {
  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy(url), { signal: AbortSignal.timeout(6000) });
      if (!res.ok) continue;
      const text = await res.text();
      if (text.includes(",")) return text;
    } catch { continue; }
  }
  return null;
}

async function loadData(manual = false) {
  const btn = document.getElementById("refreshBtn");
  btn.classList.add("spinning");
  if (manual || doctors.length === 0) showSkeletons();
  setStatus("", "Loading directory…");

  const text = await tryFetch(SHEET_CSV + "&t=" + Date.now());
  if (text) {
    const parsed = parseCSV(text).map(normalizeDoctor).filter(d => d.name);
    if (parsed.length > 0) {
      doctors = parsed;
      const t = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      setStatus("live", "Live · updated " + t);
      expandedIndex = -1;
      render();
      btn.classList.remove("spinning");
      return;
    }
  }

  if (doctors.length === 0) {
    doctors = FALLBACK;
    setStatus("cached", "Showing saved data · tap ↻ to retry");
    render();
  } else {
    setStatus("cached", "Could not refresh · showing last data");
  }
  btn.classList.remove("spinning");
}

function setStatus(type, text) {
  document.getElementById("statusDot").className = "status-dot" + (type ? " " + type : "");
  document.getElementById("statusText").textContent = text;
}

function showSkeletons() {
  document.getElementById("listWrap").innerHTML =
    [0,1,2,3].map((_, i) => `
      <div class="skeleton-card" style="animation-delay:${i*60}ms">
        <div class="skel skel-avatar"></div>
        <div class="skel-lines"><div class="skel skel-a"></div><div class="skel skel-b"></div></div>
      </div>`).join("");
  document.getElementById("filterBar").innerHTML = "";
  document.getElementById("countBadge").textContent = "—";
  document.getElementById("bottomText").textContent = "loading…";
}

function getInitials(name) {
  const parts = name.trim().split(/\s+/);
  return parts.length >= 2
    ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
    : name.substring(0, 2).toUpperCase();
}

function getGroups() {
  return ["All", ...new Set(doctors.map(d => d.group).filter(Boolean))].sort((a,b) =>
    a === "All" ? -1 : b === "All" ? 1 : a.localeCompare(b));
}

function getFiltered() {
  return doctors.filter(d => {
    const matchGroup = activeGroup === "All" || d.group === activeGroup;
    const q = searchQuery.toLowerCase();
    return matchGroup && (!q || d.name.toLowerCase().includes(q) || d.group.toLowerCase().includes(q));
  });
}

const iconPhone = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.27 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.18 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.15a16 16 0 0 0 5.94 5.94l1.42-1.42a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 14.92z"/></svg>`;
const iconSMS  = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;

function makeBtn(cls, href, icon, title, num) {
  const scheme = href.split(":")[0];
  const number = href.split(":")[1] || "";
  const cleaned = number.replace(/[^0-9+]/g, "");
  let action = "";
  if (scheme === "tel") {
    action = `onclick="nativeCall('${cleaned}');return false;"`;
  } else if (scheme === "sms") {
    action = `onclick="nativeText('${cleaned}');return false;"`;
  }
  return `<a class="action-btn ${cls}" href="${href}" ${action}>
    ${icon}
    <span class="btn-label">
      <span class="btn-title">${title}</span>
      ${num ? `<span class="btn-num">${num}</span>` : ""}
    </span>
  </a>`;
}

function nativeCall(number) {
  // Try webkit message handler first (native app)
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.phoneCall) {
    window.webkit.messageHandlers.phoneCall.postMessage(number);
  } else {
    // Fallback for browser
    window.location.href = "tel:" + number;
  }
}

function nativeText(number) {
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.sendSMS) {
    window.webkit.messageHandlers.sendSMS.postMessage(number);
  } else {
    window.location.href = "sms:" + number;
  }
}

function render() {
  const filtered = getFiltered();
  const wrap = document.getElementById("listWrap");
  document.getElementById("countBadge").textContent = filtered.length;
  document.getElementById("bottomText").textContent =
    filtered.length === 1 ? "1 physician" : filtered.length + " physicians";

  wrap.innerHTML = "";

    wrap.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No results</div><div class="empty-sub">Try a different name or group</div></div>`;
    renderFilters(); return;
  }

  if (activeGroup === "All" && !searchQuery) {
    const lbl = document.createElement("div");
    lbl.className = "section-label";
    lbl.textContent = "All Physicians";
    wrap.appendChild(lbl);
  }

  filtered.forEach((doc, i) => {

    const expanded = expandedIndex === ri;
    const card = document.createElement("div");
    card.className = "doc-card" + (expanded ? " card-expanded" : "");

    const row1 = hasCell ? `<div class="actions-row">
      ${makeBtn("btn-call",  "tel:" + doc.cell, iconPhone, "Call cell",  doc.cell)}

    </div>` : "";

    const row2 = hasOffice ? `<div class="actions-row">
      ${makeBtn("btn-office", "tel:" + doc.office, iconDesk, "Call office", doc.office)}
    </div>` : "";

    card.innerHTML = `
      <div class="card-main" onclick="toggleCard(${ri})">
        <div class="avatar">${getInitials(doc.name)}</div>
        <div class="card-info">

          <div class="doc-group">${doc.group || "—"}</div>
        </div>
        <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </div>
      <div class="card-actions">
        ${row1}${row2}
        <div class="actions-row">
          <button class="action-btn" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border)" onclick="openEdit(${ri})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <span class="btn-label"><span class="btn-title">Edit</span></span>
          </button>
          <button class="action-btn" style="background:#FCEBEB;color:#A32D2D;border:1px solid #F7C1C1" onclick="confirmDelete(${ri})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            <span class="btn-label"><span class="btn-title">Delete</span></span>
          </button>
        </div>
      </div>`;
    wrap.appendChild(card);
  });

  renderFilters();
}

function renderFilters() {
  const bar = document.getElementById("filterBar");
  bar.innerHTML = "";
  getGroups().forEach(g => {
    const chip = document.createElement("button");
    chip.className = "chip" + (g === activeGroup ? " active" : "");
    chip.textContent = g;
    chip.onclick = () => { activeGroup = g; expandedIndex = -1; render(); };
    bar.appendChild(chip);
  });
}

function toggleCard(index) {
  expandedIndex = expandedIndex === index ? -1 : index;
  render();
}

function handleSearch(val) {
  searchQuery = val; expandedIndex = -1;
  document.getElementById("clearBtn").classList.toggle("visible", val.length > 0);
  render();
}

function clearSearch() {
  document.getElementById("searchInput").value = "";
  searchQuery = ""; expandedIndex = -1;
  document.getElementById("clearBtn").classList.remove("visible");
  render();
}

async function submitDoctor() {
  const name   = document.getElementById("f-name").value.trim();
  const cell   = document.getElementById("f-cell").value.trim();
  const office = document.getElementById("f-office").value.trim();
  const group  = document.getElementById("f-group").value.trim();

  if (!name) {
    setFormStatus("Please enter a physician name.", "error");
    return;
  }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 0.7s linear infinite"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg> Adding…`;
  setFormStatus("", "");

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, cell, office, group })
    });

    // no-cors means we can't read the response, but if it didn't throw it worked
    setFormStatus("Dr. " + name + " added successfully!", "success");

    setTimeout(() => {

}

function setFormStatus(msg, type) {
  const el = document.getElementById("formStatus");
  el.textContent = msg;
  el.className = "form-status" + (type ? " " + type : "");
}

// ── Contacts Import ──
let allContacts = [];
let selectedContacts = new Set();

function importFromContacts() {
  closeDrawer();
  // Tell Swift to request contacts access and fetch contacts
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.importContacts) {
    window.webkit.messageHandlers.importContacts.postMessage("fetch");
  } else {
    alert("Contacts import is only available in the native iOS app.");
  }
}

// Called by Swift with fresh contacts every time
function receiveContacts(contacts) {
  // Always reset — ensures fresh list every import
  allContacts = [];
  selectedContacts = new Set();
  allContacts = contacts.filter(c => c.firstName || c.lastName);
  // Reset import button
  const btn = document.getElementById("contactsImportBtn");
  btn.disabled = true;
  btn.style.opacity = "0.5";
  btn.textContent = "Import selected";
  document.getElementById("contactsStatus").textContent = "";
  document.getElementById("contactsStatus").className = "form-status";
  renderContactsList();
  document.getElementById("contactsOverlay").classList.add("open");
  document.getElementById("contactsDrawer").classList.add("open");
}

function renderContactsList() {
  const list = document.getElementById("contactsList");
  if (!allContacts.length) {
    list.innerHTML = '<p style="text-align:center;color:var(--text3);font-size:13px;padding:20px">No contacts found.</p>';
    return;
  }
  list.innerHTML = allContacts.map((c, i) => {
    const name = [c.firstName, c.lastName].filter(Boolean).join(" ");
    const sub = [c.organization, c.phone].filter(Boolean).join(" · ");
    const selected = selectedContacts.has(i);
    return `<div onclick="toggleContact(${i})" style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border-radius:10px;border:1.5px solid ${selected ? '#005030' : 'var(--border)'};cursor:pointer;transition:border-color 0.15s">
      <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${selected ? '#005030' : 'var(--border)'};background:${selected ? '#005030' : 'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s">
        ${selected ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>' : ''}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</div>
        ${sub ? `<div style="font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${sub}</div>` : ''}
      </div>
    </div>`;
  }).join("");
}

function toggleContact(i) {
  if (selectedContacts.has(i)) {
    selectedContacts.delete(i);
  } else {
    selectedContacts.add(i);
  }
  const btn = document.getElementById("contactsImportBtn");
  btn.disabled = selectedContacts.size === 0;
  btn.style.opacity = selectedContacts.size === 0 ? "0.5" : "1";
  btn.textContent = selectedContacts.size > 0
    ? "Import " + selectedContacts.size + " contact" + (selectedContacts.size > 1 ? "s" : "")
    : "Import selected";
  renderContactsList();
}

async function importSelectedContacts() {
  if (!selectedContacts.size) return;
  const btn = document.getElementById("contactsImportBtn");
  btn.disabled = true;
  btn.textContent = "Importing…";

  const toImport = [...selectedContacts].map(i => allContacts[i]);
  let success = 0;
  const newDoctors = [];

  for (const c of toImport) {
    const name = [c.firstName, c.lastName].filter(Boolean).join(" ");
    try {
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: name,
          cell: c.phone || "",
          office: "",
          group: c.organization || ""
        })
      });
      success++;
      // Add to local list immediately so it appears right away
      newDoctors.push({
        name: name,
        cell: c.phone || "",
        office: "",
        group: c.organization || ""
      });
    } catch(e) { continue; }
  }

  // Inject new doctors into the live list immediately — no waiting for sheet cache
  if (newDoctors.length > 0) {
    doctors = [...doctors, ...newDoctors];
    render();
  }

  const statusEl = document.getElementById("contactsStatus");
  statusEl.textContent = success + " contact" + (success !== 1 ? "s" : "") + " added to directory!";
  statusEl.className = "form-status success";

  setTimeout(() => {
    closeContacts();
  }, 1500);
}

function closeContacts() {
  document.getElementById("contactsDrawer").classList.remove("open");
  document.getElementById("contactsOverlay").classList.remove("open");
  document.getElementById("contactsStatus").textContent = "";
  selectedContacts = new Set();
}

// ── Delete Doctor ──
function confirmDelete(index) {
  const doc = doctors[index];
  const name = doc.name;
  if (confirm("Delete Dr. " + name + " from the directory?\n\nThis cannot be undone.")) {
    deleteDoctor(index);
  }
}

async function deleteDoctor(index) {
  const doc = doctors[index];
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "delete", name: doc.name })
    });

    // Remove from local list immediately
    doctors.splice(index, 1);
    expandedIndex = -1;
    render();

  } catch(e) {
    alert("Could not delete. Please try again.");
  }
}

// ── Edit Doctor ──
function openEdit(index) {
  const doc = doctors[index];
  document.getElementById("e-original-name").value = doc.name;
  document.getElementById("e-name").value = doc.name;
  document.getElementById("e-cell").value = doc.cell;
  document.getElementById("e-office").value = doc.office;
  document.getElementById("e-group").value = doc.group;
  document.getElementById("editStatus").textContent = "";
  document.getElementById("editStatus").className = "form-status";
  document.getElementById("editOverlay").classList.add("open");
  document.getElementById("editDrawer").classList.add("open");
  expandedIndex = -1;
}

function closeEdit() {
  document.getElementById("editDrawer").classList.remove("open");
  document.getElementById("editOverlay").classList.remove("open");
}

async function saveEdit() {
  const originalName = document.getElementById("e-original-name").value;
  const name   = document.getElementById("e-name").value.trim();
  const cell   = document.getElementById("e-cell").value.trim();
  const office = document.getElementById("e-office").value.trim();
  const group  = document.getElementById("e-group").value.trim();

  if (!name) { 
    setEditStatus("Please enter a physician name.", "error"); 
    return; 
  }

  const btn = document.getElementById("editSaveBtn");
  btn.disabled = true;
  btn.textContent = "Saving…";

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "update", originalName, name, cell, office, group })
    });

    // Update local list immediately
    const idx = doctors.findIndex(d => d.name === originalName);
    if (idx !== -1) {
      doctors[idx] = { name, cell, office, group };
    }

    setEditStatus("Saved successfully!", "success");
    setTimeout(() => { closeEdit(); render(); }, 1200);

  } catch(e) {
    setEditStatus("Something went wrong. Please try again.", "error");
  }

  btn.disabled = false;
  btn.textContent = "Save changes";
}

function setEditStatus(msg, type) {
  const el = document.getElementById("editStatus");
  el.textContent = msg;
  el.className = "form-status" + (type ? " " + type : "");
}

setInterval(loadData, 5 * 60 * 1000);

if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone) {
  setTimeout(() => document.getElementById("installBanner").classList.add("show"), 2500);
}

loadData();
